<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にからす — 事業管理ポータル</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--text-dim:#8b949e;--accent:#58a6ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:480px;padding:40px 20px;text-align:center}
h1{font-size:24px;margin-bottom:8px}
.sub{color:var(--text-dim);font-size:14px;margin-bottom:32px}
.links{display:flex;flex-direction:column;gap:12px}
a{display:block;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;color:var(--text);text-decoration:none;font-size:15px;transition:all .2s}
a:hover{border-color:var(--accent);background:rgba(88,166,255,.05)}
a .desc{color:var(--text-dim);font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <h1>にからす事業管理</h1>
  <p class="sub">パスワード保護されたページです</p>
  <div class="links">
    <a href="dashboard.html">
      事業ダッシュボード
      <div class="desc">マイルストーン進捗・タスク・売上目標</div>
    </a>
    <a href="wbs-tsujii.html">
      辻井タスクビュー
      <div class="desc">辻井のWBSタスク一覧・期限・資料</div>
    </a>
    <a href="claude-code-team-guide.html">
      Claude Code チームガイド
      <div class="desc">CC環境の使い方・アーキテクチャ</div>
    </a>
  </div>
</div>
</body>
</html>
