<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にからす事業ダッシュボード</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--text-dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--cyan:#39d2c0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.login input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:8px;font-size:16px;width:260px;text-align:center}
.login button{background:var(--accent);color:#fff;border:none;padding:10px 32px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.login h1{color:var(--text);font-size:20px}
.login .error{color:var(--red);font-size:13px;display:none}
.container{max-width:1400px;margin:0 auto;padding:20px}
.hidden{display:none}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
header h1{font-size:20px;color:var(--text)}
header .meta{color:var(--text-dim);font-size:12px}
/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.kpi-card .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-card .value{font-size:28px;font-weight:700;color:var(--text)}
.kpi-card .value span{font-size:14px;color:var(--text-dim);font-weight:400}
.kpi-card .bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.kpi-card .bar .fill{height:100%;border-radius:2px;transition:width .3s}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:20px}
.grid-3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.card h2{font-size:14px;color:var(--accent);margin-bottom:10px}
.card h3{font-size:12px;color:var(--text-dim);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px}
/* MS */
.ms-card{border-left:4px solid var(--border)}
.ms-card.active{border-left-color:var(--yellow)}
.ms-card.done{border-left-color:var(--green)}
.ms-label{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-bottom:6px}
.ms-label.active{background:rgba(210,153,34,.15);color:var(--yellow)}
.ms-label.done{background:rgba(63,185,80,.15);color:var(--green)}
.ms-label.future{background:rgba(139,148,158,.1);color:var(--text-dim)}
.progress-bar{background:var(--border);border-radius:3px;height:5px;margin:6px 0}
.progress-bar .fill{height:100%;border-radius:3px}
.criteria-list{list-style:none}
.criteria-list li{padding:3px 0;font-size:12px;display:flex;justify-content:space-between;align-items:center}
/* Revenue */
.rev-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.rev-row .bar{flex:1;margin:0 10px;height:8px;background:var(--border);border-radius:4px;position:relative;overflow:hidden}
.rev-row .bar .fill{position:absolute;height:100%;border-radius:4px;background:var(--accent)}
/* Badges */
.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.badge.todo{background:rgba(248,81,73,.12);color:var(--red)}
.badge.wip{background:rgba(210,153,34,.12);color:var(--yellow)}
.badge.done{background:rgba(63,185,80,.12);color:var(--green)}
.badge.urgent{background:rgba(248,81,73,.15);color:var(--red)}
.badge.warn{background:rgba(210,153,34,.15);color:var(--yellow)}
.badge.info{background:rgba(88,166,255,.12);color:var(--accent)}
/* Filters */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar .label{font-size:12px;color:var(--text-dim);margin-right:4px}
.filter-btn{background:var(--card);border:1px solid var(--border);color:var(--text-dim);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
/* Task Table */
.task-group{margin-bottom:16px}
.task-group-header{font-size:13px;font-weight:600;color:var(--text-dim);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:2px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.task-group-header:hover{color:var(--text)}
.task-group-header .count{font-size:11px;font-weight:400}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px;border-bottom:2px solid var(--border);color:var(--text-dim);font-weight:600;font-size:11px;text-transform:uppercase}
td{padding:5px 6px;border-bottom:1px solid rgba(48,54,61,.5)}
tr:hover td{background:rgba(88,166,255,.04)}
.owner-tag{color:var(--purple);font-size:11px}
.section-title{font-size:16px;color:var(--text);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
/* Deadline */
.dl-list{list-style:none}
.dl-list li{padding:6px 0;border-bottom:1px solid rgba(48,54,61,.5);font-size:13px;display:flex;justify-content:space-between;align-items:center}
.dl-list li:last-child{border-bottom:none}
/* Risk */
.risk-card{border-left:4px solid var(--red)}
.risk-card.medium{border-left-color:var(--yellow)}
/* Stats */
.stat-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.stat-item{font-size:12px;color:var(--text-dim)}
.stat-item strong{color:var(--text);font-size:16px;display:block}
/* Footer */
.footer{text-align:center;padding:32px 0;color:var(--text-dim);font-size:11px}
/* Responsive */
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}}
@media(max-width:640px){.container{padding:12px}.kpi-grid{grid-template-columns:1fr}.grid{grid-template-columns:1fr}header h1{font-size:16px}.filter-bar{gap:4px}}
</style>
</head>

function render(){
  renderHeader();
  renderKPI();
  renderMS();
  renderRevenue();
  renderFilters();
  renderTasks();
  renderDeadlines();

function renderHeader(){
  document.getElementById('headerMeta').textContent =
    `最終更新: ${D.meta.lastUpdated} | WBS ${D.meta.wbsVersion} | ${D.meta.fyYear} ¥${(D.meta.revenueTarget/10000).toFixed(2)}億目標`;
}

function renderKPI(){
  const el = document.getElementById('kpiGrid');
  el.innerHTML = D.kpi.map(k => {
    const pct = k.target > 0 ? Math.min(100, Math.round(k.current/k.target*100)) : 0;
    const color = pct >= 80 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--accent)';
    return `<div class="kpi-card">
      <div class="label">${k.label}</div>
      <div class="value">${k.current}<span> / ${k.target}${k.unit}</span></div>
      <div class="bar"><div class="fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

function renderMS(){
  const el = document.getElementById('msGrid');
  // Show first 3 milestones prominently, rest collapsed
  const visible = D.milestones.slice(0,3);
  const rest = D.milestones.slice(3);
  let html = visible.map(ms => msCard(ms)).join('');
  if(rest.length){
    html += `<div class="card" style="grid-column:1/-1">
      <div class="task-group-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
        後半マイルストーン（${rest.map(m=>m.id).join(', ')}）
        <span class="count">クリックで展開</span>
      </div>
      <div class="hidden" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;padding-top:12px">
        ${rest.map(ms => `<div class="ms-card ${ms.status}" style="border:1px solid var(--border);border-radius:8px;padding:12px;border-left:4px solid ${ms.status==='active'?'var(--yellow)':ms.status==='done'?'var(--green)':'var(--border)'}">
          ${msInner(ms)}
        </div>`).join('')}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function msCard(ms){
  return `<div class="card ms-card ${ms.status}">
    ${msInner(ms)}
  </div>`;
}

function msInner(ms){
  const sLabel = ms.status==='done'?'完了':ms.status==='active'?'進行中':'予定';
  const color = ms.status==='done'?'var(--green)':ms.status==='active'?'var(--yellow)':'var(--border)';
  return `<span class="ms-label ${ms.status}">${sLabel}</span>
    <h2 style="font-size:14px;color:var(--accent);margin:4px 0">${ms.id}: ${ms.name}</h2>
    <div style="font-size:12px;color:var(--text-dim)">${ms.date}</div>
    <div class="progress-bar"><div class="fill" style="width:${ms.progress}%;background:${color}"></div></div>
    <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${ms.progress}%</div>
    <ul class="criteria-list">${ms.criteria.map(c =>
      `<li><span>${c.text}</span><span class="badge ${c.status}">${{done:'完了',wip:'作業中',todo:'未着手'}[c.status]}</span></li>`
    ).join('')}</ul>`;
}

function renderRevenue(){
  const cats = D.revenue.categories;
  const totalCurrent = cats.reduce((s,c)=>s+c.current,0);
  const totalTarget = cats.reduce((s,c)=>s+c.target,0);
  const existPct = Math.round(D.revenue.existing/D.revenue.total*100);
  const newPct = Math.round(totalCurrent/totalTarget*100);

  document.getElementById('revenueCard').innerHTML = `
    <h2>売上サマリ</h2>
    <div class="stat-row">
      <div class="stat-item"><strong>¥${totalCurrent.toLocaleString()}万</strong>新規実績</div>
      <div class="stat-item"><strong>¥${totalTarget.toLocaleString()}万</strong>新規目標</div>
      <div class="stat-item"><strong>¥${D.revenue.existing.toLocaleString()}万</strong>既存</div>
      <div class="stat-item"><strong>¥${D.revenue.total.toLocaleString()}万</strong>合計目標</div>
    </div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">新規進捗: ${newPct}%</div>
    <div class="progress-bar" style="height:8px"><div class="fill" style="width:${newPct}%;background:var(--accent)"></div></div>
  `;

  document.getElementById('revenueDetail').innerHTML = `
    <h2>カテゴリ別</h2>
    ${cats.map(c => {
      const pct = c.target>0 ? Math.round(c.current/c.target*100) : 0;
      return `<div class="rev-row">
        <span style="min-width:100px">${c.name}</span>
        <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
        <span style="min-width:140px;text-align:right">¥${c.current.toLocaleString()} / ¥${c.target.toLocaleString()}万</span>
      </div>`;
    }).join('')}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)">
      比率 4:3:2:1 | 既存 ¥${D.revenue.existing.toLocaleString()}万 + 新規 ¥${totalTarget.toLocaleString()}万 = ¥${D.revenue.total.toLocaleString()}万
    </div>
  `;
}

function renderFilters(){
  const owners = ['全員','小竹','辻井','ペりん'];
  const statuses = [{v:'all',l:'全て'},{v:'todo',l:'未着手'},{v:'wip',l:'作業中'},{v:'done',l:'完了'}];
  document.getElementById('filterBar').innerHTML = `
    <span class="label">担当:</span>
    ${owners.map(o => `<button class="filter-btn ${filters.owner===o?'active':''}" onclick="setFilter('owner','${o}')">${o}</button>`).join('')}
    <div class="filter-sep"></div>
    <span class="label">状態:</span>
    ${statuses.map(s => `<button class="filter-btn ${filters.status===s.v?'active':''}" onclick="setFilter('status','${s.v}')">${s.l}</button>`).join('')}
  `;
}

function setFilter(key,val){
  filters[key]=val;
  renderFilters();
  renderTasks();
}

function renderTasks(){
  const tasks = D.tasks.filter(t => {
    if(filters.owner!=='全員' && !t.owner.includes(filters.owner)) return false;
    if(filters.status!=='all' && t.status!==filters.status) return false;
    return true;
  });

  // Group by phase
  const phaseOrder = ['3月W1','3月W2','3月W3','3月W4','4月','5月','6-8月','9-10月','11-2月'];
  const groups = {};
  tasks.forEach(t => {
    if(!groups[t.phase]) groups[t.phase]=[];
    groups[t.phase].push(t);
  });

  const totalFiltered = tasks.length;
  const doneCount = tasks.filter(t=>t.status==='done').length;
  document.getElementById('taskCount').textContent = `${doneCount}/${totalFiltered} 完了`;

  if(totalFiltered===0){
    document.getElementById('taskList').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim)">該当タスクなし</div>';
    return;
  }

  let html = '';
  phaseOrder.forEach(phase => {
    if(!groups[phase]) return;
    const g = groups[phase];
    const gDone = g.filter(t=>t.status==='done').length;
    const collapsed = ['6-8月','9-10月','11-2月'].includes(phase);
    html += `<div class="task-group">
      <div class="task-group-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
        ${phase} <span class="count">${gDone}/${g.length} 完了</span>
      </div>
      <table${collapsed?' class="hidden"':''}>
        <thead><tr><th style="width:60px">ID</th><th>タスク</th><th style="width:80px">担当</th><th style="width:70px">期限</th><th style="width:60px">状態</th></tr></thead>
        <tbody>${g.map(t => `<tr>
          <td><code>${t.id}</code></td>
          <td>${t.task}</td>
          <td class="owner-tag">${t.owner}</td>
          <td>${t.deadline}</td>
          <td><span class="badge ${t.status}">${{done:'完了',wip:'作業中',todo:'未着手'}[t.status]}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  });
  document.getElementById('taskList').innerHTML = html;
}

function renderDeadlines(){
  document.getElementById('deadlineList').innerHTML = D.deadlines.map(d =>
    `<li><span>${d.label}</span><span class="badge ${d.urgency}">${d.date}</span></li>`

  ).join('');
}
